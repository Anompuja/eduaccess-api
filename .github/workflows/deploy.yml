name: CI/CD — Build & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CONTAINER_APP_NAME: eduaccess-api
  CONTAINER_APP_ENV_NAME: eduaccess-env
  IMAGE_NAME: eduaccess-api

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build, Test, Push image ke ACR
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build
        run: CGO_ENABLED=0 GOOS=linux go build -o /tmp/server ./cmd/main.go

      - name: Run tests
        run: go test ./... -timeout 60s
        continue-on-error: true

      - name: Set image tag
        id: meta
        run: echo "tag=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────
  # JOB 2: Deploy ke Azure Container Apps
  # Hanya jalan saat push ke main (bukan PR)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade -y

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: eduaccessacr
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: 8080
